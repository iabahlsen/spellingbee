<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🐝 Bravo Lu — Spelling Bee Champion</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --honey: #f9a825;
      --honey-light: #ffcc02;
      --dark: #1a1a1a;
      --white: #ffffff;
      --green: #43a047;
      --red: #e53935;
      --bg: #fff8e1;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 16px 40px;
    }

    /* ── HEADER ── */
    header {
      background: var(--dark);
      color: var(--honey);
      width: 100%;
      max-width: 620px;
      border-radius: 24px;
      padding: 22px 30px 18px;
      text-align: center;
      margin-bottom: 0;
      position: relative;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 22px,
        rgba(249,168,37,.06) 22px, rgba(249,168,37,.06) 44px
      );
    }
    .title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2rem, 7vw, 3rem);
      letter-spacing: 3px;
      position: relative;
    }
    .subtitle {
      font-size: 0.9rem;
      color: #aaa;
      margin-top: 4px;
      position: relative;
    }

    /* ── STRIPE ── */
    .stripe {
      width: 100%;
      max-width: 620px;
      height: 8px;
      background: repeating-linear-gradient(
        90deg,
        var(--dark) 0, var(--dark) 20px,
        var(--honey) 20px, var(--honey) 40px
      );
      border-radius: 0 0 8px 8px;
      margin-bottom: 16px;
    }

    /* ── GROUP SELECTOR ── */
    .group-selector {
      width: 100%;
      max-width: 620px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
      font-size: 0.85rem;
      color: #888;
      font-weight: 700;
    }
    .group-selector select {
      flex: 1;
      padding: 8px 12px;
      border-radius: 12px;
      border: 2px solid #e0e0e0;
      font-family: 'Nunito', sans-serif;
      font-size: 0.85rem;
      font-weight: 700;
      background: white;
      color: var(--dark);
      cursor: pointer;
      outline: none;
    }
    .group-selector select:focus { border-color: var(--honey); }

    /* ── CARD ── */
    .card {
      background: white;
      border-radius: 24px;
      padding: 28px 28px 24px;
      width: 100%;
      max-width: 620px;
      box-shadow: 0 6px 32px rgba(249,168,37,.18);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── PROGRESS ── */
    .progress-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 800;
      font-size: 0.85rem;
      color: #666;
    }
    .progress-bg {
      background: #f0f0f0;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-top: 7px;
    }
    .progress-fill {
      background: linear-gradient(90deg, var(--honey), var(--honey-light));
      height: 100%;
      border-radius: 99px;
      transition: width .4s ease;
    }

    /* ── HINT ── */
    .word-hint {
      text-align: center;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      letter-spacing: 10px;
      color: #ccc;
      font-weight: 900;
      min-height: 54px;
      padding: 8px 4px;
      transition: letter-spacing .2s;
    }
    .hint-label {
      text-align: center;
      color: #bbb;
      font-size: 0.8rem;
      margin-top: -12px;
    }

    /* ── AUDIO BUTTONS ── */
    .audio-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .btn-listen {
      background: var(--dark);
      color: var(--honey);
      border: none;
      border-radius: 16px;
      padding: 15px 30px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.15rem;
      cursor: pointer;
      transition: transform .1s, background .15s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-listen:hover { background: #333; transform: scale(1.03); }
    .btn-listen:active { transform: scale(.96); }
    .btn-listen.speaking { animation: pulse-dark 0.6s ease infinite alternate; }
    @keyframes pulse-dark { from { background:#1a1a1a; } to { background:#3a3a3a; } }

    .btn-slow {
      background: #f5f5f5;
      color: #555;
      border: 2px solid #e0e0e0;
      border-radius: 16px;
      padding: 15px 18px;
      font-family: 'Nunito', sans-serif;
      font-size: 0.88rem;
      font-weight: 800;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-slow:hover { background: #eee; }

    /* ── JUMP / COPY ROW ── */
    .jump-row {
      display: flex;
      align-items: center;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .jump-label { font-size: .8rem; color: #aaa; font-weight: 700; white-space: nowrap; }
    .jump-input {
      width: 62px;
      padding: 6px 10px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-family: 'Nunito', sans-serif;
      font-size: .9rem;
      font-weight: 800;
      text-align: center;
      outline: none;
    }
    .jump-input:focus { border-color: var(--honey); }
    .btn-sm {
      padding: 6px 14px;
      border-radius: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      font-family: 'Nunito', sans-serif;
      font-size: .82rem;
      font-weight: 800;
      cursor: pointer;
      color: #555;
      transition: background .15s, border-color .2s, color .2s;
      white-space: nowrap;
    }
    .btn-sm:hover { background: #f5f5f5; }
    .btn-sm.copied { border-color: var(--green); color: var(--green); }

    /* ── iOS TIP ── */
    .ios-tip {
      background: #fff3e0;
      border: 2px solid var(--honey);
      border-radius: 14px;
      padding: 10px 16px;
      font-size: .82rem;
      font-weight: 700;
      color: #e65100;
      text-align: center;
      display: none;
    }
    .ios-tip.show { display: block; }

    /* ── INPUT ── */
    #wordInput {
      width: 100%;
      font-family: 'Nunito', sans-serif;
      font-size: clamp(1.3rem, 4vw, 1.7rem);
      font-weight: 800;
      text-align: center;
      padding: 14px 16px;
      border: 3px solid #e0e0e0;
      border-radius: 16px;
      outline: none;
      transition: border-color .2s, background .2s;
      letter-spacing: 3px;
    }
    #wordInput:focus { border-color: var(--honey); }
    #wordInput.correct { border-color: var(--green); background: #e8f5e9; }
    #wordInput.wrong   { border-color: var(--red);   background: #ffebee; }
    #wordInput:disabled { opacity: .85; }

    .btn-check {
      width: 100%;
      background: var(--honey);
      color: var(--dark);
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.25rem;
      cursor: pointer;
      transition: transform .1s, background .15s;
    }
    .btn-check:hover { background: var(--honey-light); transform: scale(1.02); }
    .btn-check:active { transform: scale(.97); }
    .btn-check:disabled { background: #ddd; color: #aaa; cursor: not-allowed; transform: none; }

    /* ── FEEDBACK ── */
    .feedback {
      text-align: center;
      font-size: 1.35rem;
      font-weight: 900;
      min-height: 38px;
      border-radius: 12px;
      padding: 4px;
    }
    .feedback.ok  { color: var(--green); animation: pop .3s ease; }
    .feedback.bad { color: var(--red); }
    @keyframes pop { 0%{transform:scale(.7)} 60%{transform:scale(1.18)} 100%{transform:scale(1)} }

    /* ── NEXT ── */
    .btn-next {
      width: 100%;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 15px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      display: none;
      transition: filter .15s, transform .1s;
    }
    .btn-next:hover { filter: brightness(1.1); transform: scale(1.02); }
    .btn-next.show { display: block; }

    /* ── SCORE BADGES ── */
    .badges {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
    .badge {
      flex: 1;
      background: #f7f7f7;
      border-radius: 14px;
      padding: 10px 16px;
      text-align: center;
    }
    .badge-num {
      font-family: 'Fredoka One', cursive;
      font-size: 1.9rem;
    }
    .badge-lbl { font-size: 0.7rem; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
    .badge.ok  .badge-num { color: var(--green); }
    .badge.bad .badge-num { color: var(--red); }

    /* ── FINAL SCREEN ── */
    #finalCard {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }
    #finalCard.show { display: flex; }
    .final-emoji { font-size: 5.5rem; animation: bounce 1.1s ease-in-out infinite; }
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-18px)} }
    .final-title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(1.8rem, 6vw, 2.6rem);
      color: var(--dark);
    }
    .final-score {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.5rem, 8vw, 4rem);
      color: var(--honey);
    }
    .final-msg { color: #666; font-size: 1.05rem; font-weight: 700; max-width: 420px; }
    .btn-restart {
      background: var(--dark);
      color: var(--honey);
      border: none;
      border-radius: 16px;
      padding: 15px 40px;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-restart:hover { background: #333; }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed;
      border-radius: 2px;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 9999;
    }
    @keyframes fall {
      0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>
<body>

  <header>
    <div class="title">🐝 BRAVO LU 🐝</div>
    <div class="subtitle">Spelling Bee Champion Training · ¡Tú puedes, Lu!</div>
  </header>
  <div class="stripe"></div>

  <!-- Group override selector -->
  <div class="group-selector">
    <span>📚 Sesión:</span>
    <select id="groupSelect" onchange="changeGroup()">
      <option value="auto">📅 Automático (según el día)</option>
      <option value="0">Bloque 1 — Palabras cotidianas</option>
      <option value="1">Bloque 2 — Animales</option>
      <option value="2">Bloque 3 — Comida y bebida</option>
      <option value="3">Bloque 4 — Escuela</option>
      <option value="4">Bloque 5 — Naturaleza y tiempo</option>
      <option value="5">Bloque 6 — Colores, formas y números</option>
      <option value="6">Bloque 7 — Familia y personas</option>
      <option value="7">Bloque 8 — Deportes y hobbies</option>
      <option value="8">Bloque 9 — Lugares y transporte</option>
      <option value="9">Bloque 10 — ⚡ Nivel Campeona</option>
    </select>
  </div>

  <!-- Voice selector -->
  <div class="group-selector" style="margin-bottom:10px;">
    <span>🎙️ Voz:</span>
    <select id="voiceSelect" onchange="changeVoice()">
      <option value="">Cargando voces…</option>
    </select>
  </div>

  <!-- MAIN CARD -->
  <div class="card" id="mainCard">

    <!-- Progress -->
    <div>
      <div class="progress-row">
        <span id="sessionLabel">Cargando…</span>
        <span id="wordCount">1 / 50</span>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
      <div class="jump-row">
        <span class="jump-label">Ir a la palabra nº</span>
        <input type="number" id="jumpInput" class="jump-input" min="1" max="50" placeholder="1-50"
               onkeydown="if(event.key==='Enter')jumpToWord()">
        <button class="btn-sm" onclick="jumpToWord()">Ir →</button>
        <button class="btn-sm" id="btnCopy" onclick="copyLink()">🔗 Copiar enlace</button>
      </div>
    </div>

    <!-- Hint underscores -->
    <div>
      <div class="word-hint" id="wordHint">· · · · ·</div>
      <div class="hint-label" id="hintLabel"></div>
    </div>

    <!-- Audio buttons -->
    <div class="audio-row">
      <button class="btn-listen" id="btnListen" onclick="speakWord(1)">🔊 Escuchar</button>
      <button class="btn-slow" onclick="speakWord(0.55)">🐢 Despacio</button>
    </div>

    <!-- iOS tip -->
    <div class="ios-tip" id="iosTip">
      📱 iPhone/iPad: toca primero <strong>🔊 Escuchar</strong> — el audio se activa con tu primer toque.
    </div>

    <!-- Input -->
    <div style="display:flex;flex-direction:column;gap:10px;">
      <input
        type="text" id="wordInput"
        placeholder="escribe la palabra…"
        autocomplete="off" autocorrect="off"
        autocapitalize="off" spellcheck="false"
        onkeydown="handleKey(event)"
      >
      <button class="btn-check" id="btnCheck" onclick="checkWord()">✓ Comprobar</button>
    </div>

    <!-- Feedback -->
    <div class="feedback" id="feedback"></div>

    <!-- Next -->
    <button class="btn-next" id="btnNext" onclick="nextWord()">Siguiente palabra →</button>

    <!-- Scores -->
    <div class="badges">
      <div class="badge ok">
        <div class="badge-num" id="scoreOk">0</div>
        <div class="badge-lbl">✓ Correctas</div>
      </div>
      <div class="badge bad">
        <div class="badge-num" id="scoreErr">0</div>
        <div class="badge-lbl">✗ Errores</div>
      </div>
    </div>

  </div>

  <!-- FINAL CARD -->
  <div class="card" id="finalCard">
    <div class="final-emoji" id="finalEmoji">🐝</div>
    <div class="final-title" id="finalTitle">¡CAMPEONA!</div>
    <div class="final-score" id="finalScore"></div>
    <div class="final-msg" id="finalMsg"></div>
    <button class="btn-restart" onclick="restart()">🔄 Repetir sesión</button>
  </div>

  <script>
  // ═══════════════════════════════════════════════════════════
  //  WORD BANK  —  500 palabras en inglés, 10 bloques de 50
  // ═══════════════════════════════════════════════════════════
  const groups = [

    // ── Bloque 1: Palabras cotidianas ──
    ["apple","table","chair","house","water","bread","friend","happy","small","large",
     "first","dance","music","light","magic","dream","story","smile","cloud","river",
     "stone","brave","clean","sweet","quiet","clock","floor","north","south","plant",
     "crown","above","below","after","climb","drink","every","fresh","great","hello",
     "image","judge","knife","learn","month","night","ocean","peace","queen","round"],

    // ── Bloque 2: Animales ──
    ["tiger","eagle","horse","snake","shark","whale","zebra","panda","koala","llama",
     "camel","rabbit","parrot","monkey","donkey","turtle","lizard","spider","pigeon","salmon",
     "beetle","falcon","jaguar","toucan","walrus","badger","ferret","gorilla","dolphin","giraffe",
     "hamster","penguin","rooster","sparrow","ostrich","lobster","buffalo","cheetah","peacock","vulture",
     "meerkat","firefly","octopus","platypus","hedgehog","squirrel","flamingo","reindeer","crocodile","dragonfly"],

    // ── Bloque 3: Comida y bebida ──
    ["pizza","pasta","salad","sugar","lemon","peach","mango","melon","onion","carrot",
     "cheese","butter","coffee","orange","banana","cherry","cookie","muffin","pepper","tomato",
     "yogurt","almond","cashew","walnut","celery","radish","ginger","garlic","spinach","lettuce",
     "broccoli","pumpkin","avocado","coconut","popcorn","pretzel","noodles","pancake","sandwich","spaghetti",
     "chocolate","blueberry","raspberry","strawberry","pineapple","watermelon","cauliflower","cucumber","mushroom","cinnamon"],

    // ── Bloque 4: Escuela y aprendizaje ──
    ["pencil","eraser","ruler","lesson","answer","science","history","grammar","subject","homework",
     "notebook","schedule","diagram","chapter","exercise","practice","problem","example","explain","discuss",
     "present","research","discover","explore","observe","experiment","calculate","describe","compare","analyze",
     "conclude","library","project","student","classroom","principal","backpack","whiteboard","calculator","geography",
     "dictionary","alphabet","sentence","paragraph","question","multiply","subtract","addition","fraction","assignment"],

    // ── Bloque 5: Naturaleza y tiempo ──
    ["rain","snow","wind","storm","sunny","foggy","thunder","lightning","rainbow","season",
     "spring","summer","autumn","winter","forest","jungle","desert","island","volcano","glacier",
     "meadow","swamp","valley","canyon","mountain","waterfall","earthquake","hurricane","tornado","blizzard",
     "drought","flood","frost","breeze","hailstone","sunshine","twilight","horizon","seashore","riverside",
     "woodland","tropical","climate","weather","nature","earth","beach","sand","temperature","landscape"],

    // ── Bloque 6: Colores, formas y números ──
    ["purple","yellow","silver","golden","crimson","indigo","violet","turquoise","maroon","scarlet",
     "circle","square","triangle","rectangle","diamond","hexagon","pentagon","cylinder","pyramid","sphere",
     "eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty",
     "thirty","forty","fifty","sixty","seventy","eighty","ninety","hundred","thousand","million",
     "double","triple","single","quarter","percent","ratio","pattern","equal","measure","divide"],

    // ── Bloque 7: Familia y personas ──
    ["mother","father","brother","sister","cousin","nephew","niece","uncle","grandma","grandpa",
     "husband","daughter","neighbor","stranger","citizen","soldier","doctor","nurse","surgeon","dentist",
     "lawyer","engineer","architect","scientist","athlete","captain","leader","nervous","excited","curious",
     "grateful","generous","patient","confident","thoughtful","creative","brilliant","talented","ambitious","independent",
     "courageous","cheerful","friendly","polite","clever","honest","careful","serious","peaceful","champion"],

    // ── Bloque 8: Deportes y hobbies ──
    ["football","basketball","swimming","running","jumping","cycling","dancing","singing","painting","drawing",
     "cooking","gardening","hiking","camping","fishing","climbing","skating","skiing","tennis","volleyball",
     "baseball","gymnastics","wrestling","archery","bowling","surfing","diving","jogging","stretching","training",
     "competing","winning","losing","scoring","passing","kicking","throwing","catching","dribbling","shooting",
     "defending","attacking","celebrating","teamwork","badminton","marathon","sprinting","rugby","trophy","medal"],

    // ── Bloque 9: Lugares y transporte ──
    ["airport","station","hospital","market","museum","theater","restaurant","playground","cathedral","monument",
     "skyscraper","university","embassy","pharmacy","bakery","factory","stadium","harbor","lighthouse","bridge",
     "tunnel","highway","railway","bicycle","motorcycle","helicopter","submarine","spacecraft","satellite","continent",
     "country","capital","province","village","suburb","downtown","district","kingdom","republic","democracy",
     "government","parliament","ambassador","traveler","passport","luggage","journey","adventure","destination","departure"],

    // ── Bloque 10: ⚡ Nivel Campeona ──
    ["knowledge","language","beautiful","different","together","because","through","although","whether","thought",
     "caught","brought","enough","rhythm","occasion","necessary","separate","business","surprise","committee",
     "wednesday","february","definitely","immediately","especially","important","interesting","comfortable","perseverance","environmental",
     "communication","pronunciation","achievement","celebration","independence","representative","extraordinary","approximately","unfortunately","recommendation",
     "congratulations","accommodation","determination","entertainment","encyclopedia","mediterranean","accomplishment","qualification","misunderstanding","neighborhood"]
  ];

  const blockNames = [
    "Palabras cotidianas", "Animales", "Comida y bebida", "Escuela",
    "Naturaleza y tiempo", "Colores, formas y números", "Familia y personas",
    "Deportes y hobbies", "Lugares y transporte", "⚡ Nivel Campeona"
  ];

  // ═══════════════════════════════════════════════════════════
  //  HELPERS
  // ═══════════════════════════════════════════════════════════
  function seededRandom(seed) {
    let s = seed >>> 0;
    return () => { s = (Math.imul(s, 1664525) + 1013904223) >>> 0; return s / 4294967296; };
  }
  function seededShuffle(arr, seed) {
    const rand = seededRandom(seed);
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(rand() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ═══════════════════════════════════════════════════════════
  //  STATE
  // ═══════════════════════════════════════════════════════════
  const today    = new Date();
  const dayNum   = today.getDate();
  const dateSeed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + dayNum;

  // iOS Safari requiere un gesto del usuario antes de hablar
  const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);

  let groupIndex     = (dayNum - 1) % 10;
  let todayWords     = [];
  let currentIdx     = 0;
  let scoreOk        = 0;
  let scoreErr       = 0;
  let answered       = false;
  let speechUnlocked = !isIOS; // en iOS el primer speak debe ser gesto manual
  let selectedVoice  = null;

  // ═══════════════════════════════════════════════════════════
  //  URL STATE  (permite reanudar en otro dispositivo)
  // ═══════════════════════════════════════════════════════════
  function readURL() {
    const p = new URLSearchParams(location.search);
    if (p.has('g')) {
      const g = parseInt(p.get('g'), 10);
      if (g >= 0 && g < 10) {
        groupIndex = g;
        document.getElementById('groupSelect').value = String(g);
      }
    }
    return p.has('w') ? Math.min(49, Math.max(0, parseInt(p.get('w'), 10) || 0)) : 0;
  }

  function updateURL() {
    const p = new URLSearchParams();
    p.set('g', groupIndex);
    p.set('w', currentIdx);
    history.replaceState(null, '', '?' + p.toString());
  }

  // ═══════════════════════════════════════════════════════════
  //  INIT / GROUP CHANGE
  // ═══════════════════════════════════════════════════════════
  function init(startIdx) {
    todayWords = seededShuffle(groups[groupIndex], dateSeed);
    currentIdx = (typeof startIdx === 'number') ? startIdx : 0;
    scoreOk = 0; scoreErr = 0; answered = false;
    const label = today.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
    document.getElementById('sessionLabel').textContent =
      `📅 ${label} · ${blockNames[groupIndex]}`;
    document.getElementById('mainCard').style.display = '';
    document.getElementById('finalCard').classList.remove('show');
    if (isIOS) document.getElementById('iosTip').classList.add('show');
    loadWord();
  }

  function changeGroup() {
    const sel = document.getElementById('groupSelect').value;
    groupIndex = sel === 'auto' ? (dayNum - 1) % 10 : parseInt(sel, 10);
    init(0);
  }

  // ═══════════════════════════════════════════════════════════
  //  LOAD WORD
  // ═══════════════════════════════════════════════════════════
  function loadWord() {
    answered = false;
    const word = todayWords[currentIdx];

    document.getElementById('wordCount').textContent = `${currentIdx + 1} / 50`;
    document.getElementById('progressFill').style.width = `${(currentIdx / 50) * 100}%`;

    // Underscores hint
    document.getElementById('wordHint').textContent = Array.from(word).map(() => '_').join(' ');
    document.getElementById('hintLabel').textContent = `${word.length} letras`;

    // Reset input
    const inp = document.getElementById('wordInput');
    inp.value = ''; inp.className = ''; inp.disabled = false;
    inp.focus();

    // Reset UI
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';
    document.getElementById('btnCheck').disabled = false;
    document.getElementById('btnNext').classList.remove('show');

    // Update score badges
    document.getElementById('scoreOk').textContent  = scoreOk;
    document.getElementById('scoreErr').textContent = scoreErr;

    // Actualizar URL para que se pueda reanudar en otro dispositivo
    updateURL();

    // Auto-speak — en iOS se omite hasta que el usuario haya tocado 🔊 al menos una vez
    if (speechUnlocked) setTimeout(() => speakWord(1), 380);
  }

  // ═══════════════════════════════════════════════════════════
  //  SPEECH  (Web Speech API — no server needed)
  // ═══════════════════════════════════════════════════════════
  // ═══════════════════════════════════════════════════════════
  //  VOICE SELECTION
  // ═══════════════════════════════════════════════════════════
  function loadVoices() {
    const all = speechSynthesis.getVoices();
    const english = all.filter(v => v.lang.startsWith('en'));
    if (!english.length) return;

    const sel = document.getElementById('voiceSelect');
    sel.innerHTML = '';
    english.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${v.name} (${v.lang})`;
      sel.appendChild(opt);
    });

    // Restaurar preferencia guardada
    const saved = localStorage.getItem('spellingBeeVoice');
    let best = english.findIndex(v => v.name === saved);

    if (best < 0) {
      // Voces naturales en orden de preferencia
      const preferred = ['Samantha','Google US English','Nicky','Karen','Moira',
                         'Tessa','Victoria','Fiona','Google UK English Female'];
      best = english.findIndex(v => preferred.some(n => v.name.includes(n)));
      if (best < 0) best = 0;
    }
    sel.value = best;
    selectedVoice = english[best];
  }

  function changeVoice() {
    const sel = document.getElementById('voiceSelect');
    const english = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
    selectedVoice = english[parseInt(sel.value, 10)] || null;
    if (selectedVoice) localStorage.setItem('spellingBeeVoice', selectedVoice.name);
    // Previsualizar la voz seleccionada
    if (speechUnlocked && todayWords.length) speakWord(1);
  }

  // ═══════════════════════════════════════════════════════════
  //  SPEECH  (Web Speech API — no server needed)
  // ═══════════════════════════════════════════════════════════
  function speakWord(rate) {
    if (!window.speechSynthesis) {
      alert('Tu navegador no soporta texto a voz.\nPrueba con Chrome o Safari.');
      return;
    }
    // Desbloquear audio en iOS con el primer gesto del usuario
    if (!speechUnlocked) {
      speechUnlocked = true;
      document.getElementById('iosTip').classList.remove('show');
    }
    speechSynthesis.cancel();
    const word = todayWords[currentIdx];
    const utt  = new SpeechSynthesisUtterance(word);
    utt.lang  = 'en-US';
    utt.rate  = rate;
    utt.pitch = 0.95; // más suave que el valor por defecto
    if (selectedVoice) utt.voice = selectedVoice;

    const btn = document.getElementById('btnListen');
    btn.classList.add('speaking');
    utt.onend = () => btn.classList.remove('speaking');

    speechSynthesis.speak(utt);
  }

  // ═══════════════════════════════════════════════════════════
  //  CHECK
  // ═══════════════════════════════════════════════════════════
  function checkWord() {
    if (answered) return;
    const inp    = document.getElementById('wordInput');
    const typed  = inp.value.trim().toLowerCase();
    const target = todayWords[currentIdx].toLowerCase();
    if (!typed) { inp.focus(); return; }

    answered = true;
    document.getElementById('btnCheck').disabled = true;
    inp.disabled = true;

    const fb = document.getElementById('feedback');

    if (typed === target) {
      scoreOk++;
      inp.classList.add('correct');
      const msgs = [
        "¡Bravo Lu! 🌟","¡Perfecta! 🎉","¡Genial! 💛","¡Campeona! 🏆",
        "¡Sí, sí, sí! 🐝","¡Eso es! ✨","¡Brillante! 💫","¡Increíble! 🎊",
        "¡Sin fallos! 🔥","¡Lu, qué crack! ⭐"
      ];
      fb.textContent = msgs[Math.floor(Math.random() * msgs.length)];
      fb.className = 'feedback ok';
      launchConfetti(28);
    } else {
      scoreErr++;
      inp.classList.add('wrong');
      fb.textContent = `Era: "${target}" 📝`;
      fb.className = 'feedback bad';
      setTimeout(() => speakWord(0.65), 600);
    }

    document.getElementById('scoreOk').textContent  = scoreOk;
    document.getElementById('scoreErr').textContent = scoreErr;

    if (currentIdx < 49) {
      document.getElementById('btnNext').classList.add('show');
    } else {
      setTimeout(showFinal, 1600);
    }
  }

  function handleKey(e) {
    if (e.key === 'Enter') { answered ? nextWord() : checkWord(); }
  }

  // ═══════════════════════════════════════════════════════════
  //  NAVIGATION
  // ═══════════════════════════════════════════════════════════
  function nextWord() {
    currentIdx++;
    if (currentIdx >= 50) { showFinal(); } else { loadWord(); }
  }

  // ═══════════════════════════════════════════════════════════
  //  FINAL SCREEN
  // ═══════════════════════════════════════════════════════════
  function showFinal() {
    document.getElementById('mainCard').style.display = 'none';
    document.getElementById('progressFill').style.width = '100%';

    const pct = Math.round((scoreOk / 50) * 100);
    let emoji, title, msg;

    if (pct === 100) {
      emoji = '🏆'; title = '¡PERFECTA, CAMPEONA!';
      msg = '¡100%! Lu, eres imparable. ¡El spelling bee es tuyo!';
    } else if (pct >= 90) {
      emoji = '🌟'; title = '¡INCREÍBLE, LU!';
      msg = `${pct}% correcto. ¡Estás lista para arrasar en la final!`;
    } else if (pct >= 70) {
      emoji = '🐝'; title = '¡BRAVO LU!';
      msg = `${pct}% correcto. ¡Muy bien! Un poco más de práctica y a por el trofeo.`;
    } else if (pct >= 50) {
      emoji = '💪'; title = '¡SIGUE ASÍ, LU!';
      msg = `${pct}% correcto. ¡Ya casi! Repasa las que fallaste y mañana lo petas.`;
    } else {
      emoji = '🌱'; title = '¡A PRACTICAR, LU!';
      msg = `${pct}% correcto. Cada error es aprendizaje. ¡Tú puedes!`;
    }

    document.getElementById('finalEmoji').textContent = emoji;
    document.getElementById('finalTitle').textContent = title;
    document.getElementById('finalScore').textContent = `${scoreOk} / 50`;
    document.getElementById('finalMsg').textContent   = msg;
    document.getElementById('finalCard').classList.add('show');

    if (pct >= 80) launchConfetti(70);
  }

  function restart() {
    currentIdx = 0; scoreOk = 0; scoreErr = 0; answered = false;
    // Re-shuffle with a slightly different seed so order changes
    todayWords = seededShuffle(groups[groupIndex], dateSeed + currentIdx + Date.now() % 1000);
    document.getElementById('mainCard').style.display = '';
    document.getElementById('finalCard').classList.remove('show');
    loadWord();
  }

  // ═══════════════════════════════════════════════════════════
  //  JUMP & COPY LINK
  // ═══════════════════════════════════════════════════════════
  function jumpToWord() {
    const inp = document.getElementById('jumpInput');
    const n = parseInt(inp.value, 10);
    if (isNaN(n) || n < 1 || n > 50) { inp.focus(); inp.select(); return; }
    currentIdx = n - 1;
    scoreOk = 0; scoreErr = 0; answered = false;
    inp.value = '';
    loadWord();
  }

  function copyLink() {
    const btn = document.getElementById('btnCopy');
    const url = location.href;
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(url)
        .then(() => {
          btn.textContent = '✓ Copiado!';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = '🔗 Copiar enlace'; btn.classList.remove('copied'); }, 2200);
        })
        .catch(() => { prompt('Copia este enlace:', url); });
    } else {
      prompt('Copia este enlace:', url);
    }
  }

  // ═══════════════════════════════════════════════════════════
  //  CONFETTI  (pure JS, no library)
  // ═══════════════════════════════════════════════════════════
  function launchConfetti(n) {
    const colors = ['#f9a825','#ffcc02','#1a1a1a','#43a047','#e91e63','#1976d2','#9c27b0','#ff5722'];
    for (let i = 0; i < n; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.cssText = `
          left:${Math.random() * 100}vw;
          top:-12px;
          width:${Math.random() * 9 + 6}px;
          height:${Math.random() * 9 + 6}px;
          background:${colors[Math.floor(Math.random() * colors.length)]};
          animation-duration:${Math.random() * 1.8 + 1.4}s;
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 3600);
      }, i * 35);
    }
  }

  // ─── START ───
  // Cargar voces (async en algunos navegadores)
  if (typeof speechSynthesis !== 'undefined') {
    loadVoices();
    speechSynthesis.onvoiceschanged = loadVoices;
  }
  init(readURL());
  </script>
</body>
